<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box h4 {
            color: #1976D2;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-box p {
            color: #555;
            font-size: 13px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result pre {
            background: rgba(0, 0, 0, 0.05);
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 Tạo Tài Khoản Admin</h1>
        <p class="subtitle">Sử dụng API để đăng ký tài khoản admin mới</p>

        <div class="info-box">
            <h4>📋 Hướng dẫn:</h4>
            <p>
                1. Nhập thông tin tài khoản admin mới<br>
                2. Click "Tạo Tài Khoản Admin"<br>
                3. Nếu thành công, chạy SQL để cập nhật type = 'admin'<br>
                4. Login với tài khoản vừa tạo
            </p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="admin"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@test.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập password (tối thiểu 6 ký tự)"
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Nhập lại password"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit" class="btn" id="registerBtn">
                Tạo Tài Khoản Admin
            </button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5069';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const resultDiv = document.getElementById('result');

            // Validate passwords match
            if (password !== confirmPassword) {
                alert('❌ Password và Confirm Password không khớp!');
                return;
            }

            // Disable button
            registerBtn.disabled = true;
            registerBtn.textContent = 'Đang tạo tài khoản...';
            resultDiv.style.display = 'none';

            console.log('🚀 Creating admin account...');
            console.log('Username:', username);
            console.log('Email:', email);

            try {
                const response = await fetch(`${API_BASE_URL}/api/Auth/register-contestant`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        confirmPassword,
                        customFields: []
                    })
                });

                console.log('Response Status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Account created successfully:', data);

                    const sqlQuery = `-- Cập nhật user vừa tạo thành admin
UPDATE Users 
SET Type = 'admin' 
WHERE Username = '${username}';

-- Kiểm tra
SELECT Id, Username, Email, Type 
FROM Users 
WHERE Username = '${username}';`;

                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Tài Khoản Đã Được Tạo!</h3>
                        <p><strong>Username:</strong> ${username}</p>
                        <p><strong>Email:</strong> ${email}</p>
                        <p><strong>Password:</strong> ${password}</p>
                        <p style="margin-top: 15px; color: #856404; background: #fff3cd; padding: 10px; border-radius: 5px;">
                            ⚠️ <strong>Bước tiếp theo:</strong> Chạy SQL sau để cập nhật type = 'admin'
                        </p>
                        <pre>${sqlQuery}</pre>
                        <button class="copy-btn" onclick="copySQL()">📋 Copy SQL</button>
                        <p style="margin-top: 15px;">
                            Sau khi chạy SQL, bạn có thể login với:<br>
                            <strong>Username:</strong> ${username}<br>
                            <strong>Password:</strong> ${password}
                        </p>
                    `;
                    resultDiv.style.display = 'block';

                    // Store SQL for copy function
                    window.generatedSQL = sqlQuery;
                } else {
                    const errorData = await response.json();
                    console.error('❌ Registration failed:', errorData);
                    
                    let errorMessage = errorData.message || 'Đăng ký thất bại';
                    if (errorData.errors) {
                        errorMessage += '\n\nChi tiết lỗi:\n';
                        for (const [field, errors] of Object.entries(errorData.errors)) {
                            errorMessage += `- ${field}: ${errors.join(', ')}\n`;
                        }
                    }
                    
                    alert('❌ ' + errorMessage);
                }
            } catch (error) {
                console.error('💥 ERROR:', error);
                alert('❌ Lỗi kết nối!\n\n' + error.message + '\n\nKiểm tra xem backend có đang chạy không?');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Tạo Tài Khoản Admin';
            }
        });

        function copySQL() {
            if (window.generatedSQL) {
                navigator.clipboard.writeText(window.generatedSQL).then(() => {
                    alert('✅ Đã copy SQL vào clipboard!');
                }).catch(err => {
                    console.error('Failed to copy:', err);
                    alert('❌ Không thể copy. Vui lòng copy thủ công.');
                });
            }
        }
    </script>
</body>
</html>
