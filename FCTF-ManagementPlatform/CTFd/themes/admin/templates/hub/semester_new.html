{% extends "admin/hub/base.html" %}

{% block content %}
<div class="hub-page-header">
    <h1><i class="bx bx-calendar-plus"></i> Create Semester</h1>
    <div class="subtitle">
        <a href="{{ url_for('admin.hub_semesters') }}" style="color:var(--primary-orange); text-decoration:none;">
            <i class="bx bx-arrow-back"></i> Back to Semesters
        </a>
    </div>
</div>

<div class="hub-container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="hub-card p-4">
                <div id="form-alert" class="hub-alert hub-alert-danger d-none"></div>

                <form id="semester-form">
                    <div class="hub-form-group">
                        <label for="semester_name">Semester Name <span class="text-danger">*</span></label>
                        <input type="text" id="semester_name" name="semester_name"
                               class="hub-form-control"
                               placeholder="e.g. HK1-2024, Spring 2025"
                               maxlength="128" required>
                        <small>Tên kỳ học, phải là duy nhất trong hệ thống</small>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="hub-form-group">
                                <label for="start_time">Start Date</label>
                                <input type="date" id="start_time" name="start_time"
                                       class="hub-form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="hub-form-group">
                                <label for="end_time">End Date</label>
                                <input type="date" id="end_time" name="end_time"
                                       class="hub-form-control">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a href="{{ url_for('admin.hub_semesters') }}" class="hub-btn">Cancel</a>
                        <button type="submit" class="hub-btn hub-btn-primary" id="submit-btn">
                            <i class="bx bx-save"></i> Create Semester
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('semester-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('submit-btn');
    var alert = document.getElementById('form-alert');
    alert.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> Creating...';

    var name = document.getElementById('semester_name').value.trim();
    var start = document.getElementById('start_time').value;
    var end = document.getElementById('end_time').value;

    if (!name) {
        showError('Semester name is required.');
        return;
    }

    fetch('/api/v1/semesters', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'CSRF-Token': init.csrfNonce,
        },
        body: JSON.stringify({
            semester_name: name,
            start_time: start || null,
            end_time: end || null,
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            window.location.href = '{{ url_for("admin.hub_semesters") }}';
        } else {
            showError(data.message || 'Failed to create semester.');
        }
    })
    .catch(e => showError('Network error: ' + e));

    function showError(msg) {
        alert.textContent = msg;
        alert.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bx bx-save"></i> Create Semester';
    }
});
</script>
{% endblock %}
