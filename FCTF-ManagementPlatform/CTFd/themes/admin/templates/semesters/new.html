{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0 mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.semesters_listing') }}">Semesters</a></li>
                <li class="breadcrumb-item active">Create New</li>
            </ol>
        </nav>
        <h1><i class="bx bx-calendar-plus"></i> Create New Semester</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="nonce" value="{{ Session.nonce }}">

                        <div class="form-group">
                            <label>Semester Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                placeholder="e.g. Semester 1, 2025-2026">
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Start Date</label>
                                <input type="datetime-local" name="start_time" class="form-control">
                            </div>
                            <div class="form-group col-md-6">
                                <label>End Date</label>
                                <input type="datetime-local" name="end_time" class="form-control">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('admin.semesters_listing') }}"
                                class="btn btn-outline-secondary mr-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bx bx-save"></i> Create Semester
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
