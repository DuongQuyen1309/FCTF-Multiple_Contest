{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0 mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.contests_listing') }}">Contests</a></li>
                <li class="breadcrumb-item active">Create New</li>
            </ol>
        </nav>
        <h1><i class="bx bx-flag"></i> Create New Contest</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="nonce" value="{{ Session.nonce }}">

                        <div class="form-group">
                            <label>Contest Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                placeholder="e.g. CTF Round 1">
                        </div>

                        <div class="form-group">
                            <label>Slug</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">/contest/</span>
                                </div>
                                <input type="text" name="slug" class="form-control"
                                    placeholder="auto-generated if empty">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Optional description..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Semester</label>
                            <select name="semester_id" class="form-control">
                                <option value="">— No semester —</option>
                                {% for sem in semesters %}
                                <option value="{{ sem.id }}">{{ sem.semester_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>State</label>
                                <select name="state" class="form-control">
                                    {% for s in ['hidden', 'upcoming', 'active', 'paused', 'ended'] %}
                                    <option value="{{ s }}" {% if s=='hidden' %}selected{% endif %}>
                                        {{ s|capitalize }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group col-md-6">
                                <label>User Mode</label>
                                <select name="user_mode" class="form-control">
                                    <option value="users">Users</option>
                                    <option value="teams">Teams</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Start Time</label>
                                <input type="datetime-local" name="start_time" class="form-control">
                            </div>
                            <div class="form-group col-md-4">
                                <label>End Time</label>
                                <input type="datetime-local" name="end_time" class="form-control">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Freeze Scoreboard</label>
                                <input type="datetime-local" name="freeze_scoreboard_at" class="form-control">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <a href="{{ url_for('admin.contests_listing') }}"
                                class="btn btn-outline-secondary mr-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bx bx-save"></i> Create Contest
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
